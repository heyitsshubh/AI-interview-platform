services:
  # ─── FastAPI Backend ──────────────────────────────────────────────
  - type: web
    name: ai-interview-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: AI Interview Platform
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-interview-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: ai-interview-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: ai-interview-redis
          type: redis
          property: port
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: STORAGE_PATH
        value: ./storage
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      # Add these manually in Render dashboard:
      # GEMINI_API_KEY
      # OPENAI_API_KEY
      # SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD
      # SMTP_FROM, SMTP_FROM_NAME

  # ─── Background Worker ────────────────────────────────────────────
  - type: worker
    name: ai-interview-worker
    runtime: node
    rootDir: worker
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        value: https://ai-interview-platform-7m8j.onrender.com
      # The rest must be added in the Render Dashboard to match the backend:
      # REDIS_HOST, REDIS_PORT, REDIS_PASSWORD
      # INTERNAL_API_KEY (copy from Backend)
      # OPENAI_API_KEY
      # SMTP variables

  # ─── PostgreSQL Database ──────────────────────────────────────────
databases:
  - name: ai-interview-db
    databaseName: ai_interview
    user: ai_interview_user
    plan: free
