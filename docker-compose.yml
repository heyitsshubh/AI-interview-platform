version: '3.9'

services:

  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_interview_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_interview
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_interview"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_interview_net

  # ─── Redis (Queue + Cache) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_interview_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_interview_net

  # ─── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_interview_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-securepassword}@ai_interview_postgres:5432/ai_interview
      - REDIS_HOST=ai_interview_redis
      - REDIS_PORT=6379
    volumes:
      - ./backend/storage:/app/storage
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - ai_interview_net

  # ─── Celery Worker (Python) ───────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_interview_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-securepassword}@ai_interview_postgres:5432/ai_interview
      - REDIS_HOST=ai_interview_redis
      - REDIS_PORT=6379
    volumes:
      - ./backend/storage:/app/storage
      - ./backend:/app
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ai_interview_net

  # ─── Node.js BullMQ Worker ────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: ai_interview_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_HOST=ai_interview_redis
      - REDIS_PORT=6379
      - API_BASE_URL=http://ai_interview_backend:8000
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ai_interview_net

  # ─── Alembic Migration Runner (one-shot) ─────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_interview_migrate
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-securepassword}@ai_interview_postgres:5432/ai_interview
    command: ["sh", "-c", "alembic upgrade head && echo 'Migrations complete'"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_interview_net
    profiles:
      - migrate  # Only run with: docker compose --profile migrate up migrate

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  ai_interview_net:
    driver: bridge
